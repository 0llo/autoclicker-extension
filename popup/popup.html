<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Auto-Clicker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h2>High Precision Auto-Clicker</h2>
  <div class="form-group">
    <label for="selector">対象要素のCSSセレクター</label>
    <div class="selector-input-area">
      <input type="text" id="selector" placeholder=".enroll-btn, #target-id">
      <button id="pick-btn" title="画面から要素を選ぶ">🔍</button>
    </div>
  </div>
  
  <div class="form-group">
    <label for="target-time">実行日時</label>
    <input type="datetime-local" id="target-time" step="1">
  </div>
  
  <div class="actions">
    <button id="start-btn" class="primary">待機スタート</button>
    <button id="cancel-btn" class="danger" disabled>キャンセル</button>
  </div>
  
  <div id="status" class="status-msg"></div>
  <div id="countdown" class="status-msg" style="font-size: 14px; font-weight: bold; margin-top: 5px; color: #d32f2f;"></div>

  <script src="popup.js"></script>
</body>
</html>
