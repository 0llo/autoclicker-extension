<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 200px;
      padding: 10px;
      font-family: sans-serif;
    }
    .input-group {
      margin-bottom: 10px;
    }
    input[type="number"] {
      width: 60px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-bottom: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>Auto Clicker</h3>
  <div class="input-group">
    <label>間隔 (ミリ秒): <input type="number" id="interval" value="1000" min="100"></label>
  </div>
  <button id="start">スタート</button>
  <button id="stop">ストップ</button>
  <script src="popup.js"></script>
</body>
</html>
